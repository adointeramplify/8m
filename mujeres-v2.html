<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>60 Mujeres · 8M</title>
  <link rel="stylesheet" href="//s1.ppllstatics.com/starfish/1.6.11/starfish-live-blue.css">
  <style>
    :root {
      --deep:      #0d001a;
      --dark:      #1a0033;
      --mid:       #4a0080;
      --accent:    #9b30d0;
      --bright:    #e040fb;
      --light:     #f0d9ff;
      --soft:      #c080ff;
      --ciencia:   #7b3fff;
      --arte:      #e040fb;
      --politica:  #ff4fa0;
      --literatura:#b44fef;
      --deporte:   #40c4ff;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--deep);
      color: #fff;
      font-family: 'Guardian TextSans Regular', sans-serif;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* ── HEADER ─────────────────────────────── */
    .hdr {
      background: linear-gradient(180deg, #1f003b 0%, #0d001a 100%);
      border-bottom: 1px solid rgba(155, 48, 208, .2);
      padding: 1.4rem 2rem 0;
    }

    .hdr-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.6rem;
    }

    .hdr-back {
      display: inline-flex; align-items: center; gap: .45rem;
      font-family: 'Guardian TextSans Medium', sans-serif;
      font-size: .75rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--accent); transition: color .25s;
    }
    .hdr-back:hover { color: var(--bright); }

    .hdr-date {
      font-family: 'Guardian TextSans Medium', sans-serif;
      font-size: .72rem; letter-spacing: .2em; text-transform: uppercase;
      color: rgba(155, 48, 208, .5);
    }

    .hdr-main {
      text-align: center;
      padding-bottom: 1.8rem;
    }

    .hdr-eyebrow {
      font-family: 'Guardian TextSans Medium', sans-serif;
      font-size: .68rem; letter-spacing: .5em; text-transform: uppercase;
      color: var(--accent); margin-bottom: .9rem;
      display: flex; align-items: center; justify-content: center; gap: .8rem;
    }
    .hdr-eyebrow::before, .hdr-eyebrow::after {
      content: ''; flex: 1; max-width: 80px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(155,48,208,.5));
    }
    .hdr-eyebrow::after { background: linear-gradient(to left, transparent, rgba(155,48,208,.5)); }

    .hdr-title {
      font-family: 'Guardian Sans Semibold', sans-serif;
      font-size: clamp(1.6rem, 4.5vw, 3rem);
      color: var(--light); line-height: 1.1;
      margin-bottom: .7rem;
    }

    .hdr-sub {
      font-family: 'IBM Plex Serif Italic', serif;
      font-style: italic;
      font-size: clamp(.85rem, 1.8vw, 1rem);
      color: var(--soft);
    }

    .hdr-rule {
      margin-top: 1.6rem;
      display: flex; align-items: center; justify-content: center; gap: .6rem;
    }
    .hdr-rule-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, rgba(155,48,208,.35), rgba(224,64,251,.5), rgba(155,48,208,.35), transparent);
    }
    .hdr-rule-sym { font-size: .9rem; color: var(--bright); opacity: .7; }

    /* ── GRID ────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 3px;
      padding: 3px;
    }

    /* ── CARD ────────────────────────────────── */
    .card {
      position: relative;
      padding-top: 133%; /* fallback 3:4 para navegadores sin aspect-ratio */
      aspect-ratio: 3 / 4;
      overflow: hidden;
      cursor: pointer;
      background: var(--dark);
    }
    @supports (aspect-ratio: 3/4) {
      .card { padding-top: 0; }
    }

    /* staggered entrance */
    .card {
      opacity: 0;
      transform: scale(.96);
      animation: cardIn .5s ease forwards;
    }

    @keyframes cardIn {
      to { opacity: 1; transform: scale(1); }
    }

    .card-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      display: block;
      transition: transform .5s ease;
    }

    .card-fallback {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem; color: rgba(255,255,255,.06);
    }
    .card-fallback::before {
      content: ''; position: absolute; inset: 0; opacity: .55;
    }
    .cat-ciencia    .card-fallback::before { background: linear-gradient(160deg, #0e0030, #250050); }
    .cat-arte       .card-fallback::before { background: linear-gradient(160deg, #1e0035, #3a0055); }
    .cat-politica   .card-fallback::before { background: linear-gradient(160deg, #300020, #550035); }
    .cat-literatura .card-fallback::before { background: linear-gradient(160deg, #150030, #380050); }
    .cat-deporte    .card-fallback::before { background: linear-gradient(160deg, #001830, #003050); }
    .card-fallback span { position: relative; z-index: 1; }

    /* name overlay */
    .card-name-wrap {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 2rem .9rem .8rem;
      background: linear-gradient(to top, rgba(13,0,26,.95) 0%, rgba(13,0,26,.6) 60%, transparent 100%);
      transform: translateY(4px);
      transition: transform .35s ease, background .35s ease;
    }

    .card-name {
      font-family: 'Guardian Sans Semibold', sans-serif;
      font-size: clamp(.75rem, 1.4vw, .92rem);
      color: var(--light);
      line-height: 1.25;
    }

    .card-role-hint {
      font-family: 'Guardian TextSans Medium', sans-serif;
      font-size: .65rem; letter-spacing: .06em;
      margin-top: .25rem;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .3s ease .05s, transform .3s ease .05s;
    }
    .cat-ciencia    .card-role-hint { color: var(--ciencia); }
    .cat-arte       .card-role-hint { color: var(--arte); }
    .cat-politica   .card-role-hint { color: var(--politica); }
    .cat-literatura .card-role-hint { color: var(--literatura); }
    .cat-deporte    .card-role-hint { color: var(--deporte); }

    /* hover */
    .card:hover .card-img { transform: scale(1.06); }
    .card:hover .card-name-wrap { transform: translateY(0); }
    .card:hover .card-role-hint { opacity: 1; transform: translateY(0); }

    /* ── MODAL ───────────────────────────────── */
    #modal-bg {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(13, 0, 26, .85);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    #modal-bg.open { display: flex; }

    .modal {
      background: linear-gradient(145deg, #1a0033, #0d001a);
      border: 1px solid rgba(155, 48, 208, .35);
      border-radius: 16px;
      max-width: 500px; width: 100%;
      max-height: 90vh;
      max-height: 90svh;
      overflow-y: auto;
      display: flex; flex-direction: column;
      animation: modalIn .3s cubic-bezier(.22,.68,0,1.2);
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(.9) translateY(24px); }
      to   { opacity: 1; transform: scale(1)  translateY(0); }
    }

    .modal-photo {
      width: 100%; height: 300px;
      position: relative; overflow: hidden;
      background: #0d001a; flex-shrink: 0;
    }
    .modal-photo img {
      width: 100%; height: 100%;
      object-fit: contain; object-position: center top;
      display: block; opacity: 0;
      transition: opacity .5s ease;
    }
    .modal-photo img.loaded { opacity: 1; }
    .modal-photo-fallback {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem; color: rgba(255,255,255,.06);
    }
    .modal-photo-fallback::before {
      content: ''; position: absolute; inset: 0;
    }

    .modal-body {
      padding: 1.4rem 1.5rem 1.8rem;
      display: flex; flex-direction: column; gap: .7rem;
    }

    .modal-name {
      font-family: 'Guardian Sans Semibold', sans-serif;
      font-size: 1.5rem; color: var(--light);
      line-height: 1.15;
    }

    .modal-meta {
      display: flex; align-items: center; gap: .5rem; flex-wrap: wrap;
    }

    .modal-cat {
      font-family: 'Guardian TextSans Medium', sans-serif;
      font-size: .65rem; letter-spacing: .15em; text-transform: uppercase;
      padding: .2rem .65rem; border-radius: 20px; border: 1px solid currentColor;
    }

    .modal-role {
      font-family: 'Guardian TextSans Medium', sans-serif;
      font-size: .82rem; color: var(--soft);
    }

    .modal-country {
      font-size: .72rem; color: rgba(192, 128, 255, .5);
    }

    .modal-quote {
      font-family: 'IBM Plex Serif Italic', serif;
      font-style: italic;
      font-size: 1.05rem; color: var(--light);
      line-height: 1.7;
      border-left: 2px solid var(--bright);
      padding-left: 1rem;
      margin-top: .3rem;
    }

    .modal-close {
      position: absolute; top: .9rem; right: .9rem;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(74, 0, 128, .5);
      border: 1px solid rgba(155, 48, 208, .4);
      color: var(--soft);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: .9rem;
      transition: background .2s;
    }
    .modal-close:hover { background: var(--mid); }
    .modal-wrap { position: relative; }

    /* ── FOOTER ──────────────────────────────── */
    footer {
      text-align: center;
      padding: 2.5rem 2rem;
      color: rgba(155, 48, 208, .35);
      font-size: .7rem; letter-spacing: .3em; text-transform: uppercase;
      border-top: 1px solid rgba(155, 48, 208, .1);
      margin-top: 3px;
    }

    /* ── RESPONSIVE ──────────────────────────── */
    @media (max-width: 600px) {
      .hdr { padding: 1rem 1rem 0; }
      .hdr-eyebrow::before, .hdr-eyebrow::after { max-width: 30px; }
      #grid { grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
    }
    @media (min-width: 1200px) {
      #grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    }
  </style>
</head>

/* ══════════════════════════════════════════
   CAT CONFIG
══════════════════════════════════════════ */
const CAT_LABEL = { ciencia:"Ciencia", arte:"Arte y Cultura", politica:"Política", literatura:"Literatura", deporte:"Deporte" };
const CAT_COLOR = { ciencia:"var(--ciencia)", arte:"var(--arte)", politica:"var(--politica)", literatura:"var(--literatura)", deporte:"var(--deporte)" };

/* ══════════════════════════════════════════
   RENDER GRID — staggered animation
══════════════════════════════════════════ */
const grid = document.getElementById('grid');

DATA.forEach((m, i) => {
  const card = document.createElement('article');
  card.className = `card cat-${m.t}`;
  card.style.animationDelay = `${i * 30}ms`;

  card.innerHTML = `
    <div class="card-fallback"><span>♀</span></div>
    ${m.foto ? `<img class="card-img" src="${m.foto}" alt="${m.n}" loading="lazy" onload="this.classList.add('loaded')">` : ''}
    <div class="card-name-wrap">
      <p class="card-name">${m.n}</p>
      <p class="card-role-hint">${m.c}</p>
    </div>`;

  card.addEventListener('click', () => openModal(m));
  grid.appendChild(card);
});

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
const modalBg   = document.getElementById('modal-bg');
const modalImg  = document.getElementById('modal-img');
const modalFall = document.getElementById('modal-fallback');

function openModal(m) {
  document.getElementById('modal-name').textContent    = m.n;
  document.getElementById('modal-role').textContent    = m.c;
  document.getElementById('modal-country').textContent = m.p;
  document.getElementById('modal-quote').textContent   = m.q;

  const catEl = document.getElementById('modal-cat');
  catEl.textContent  = CAT_LABEL[m.t] || m.t;
  catEl.style.color  = CAT_COLOR[m.t] || 'var(--accent)';

  modalFall.textContent = '♀';
  modalImg.classList.remove('loaded');

  if (m.foto) {
    modalImg.src = m.foto;
    modalImg.onload = () => modalImg.classList.add('loaded');
  } else {
    modalImg.src = '';
  }

  modalBg.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modalBg.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
modalBg.addEventListener('click', e => { if (e.target === modalBg) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
