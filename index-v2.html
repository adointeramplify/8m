<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>8M · Día Internacional de la Mujer</title>
  <link rel="stylesheet" href="//s1.ppllstatics.com/starfish/1.6.11/starfish-live-blue.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d001a;
      font-family: 'Guardian TextSans Regular', sans-serif;
    }

    /* ── MOSAICO ─────────────────────────────── */
    #mosaic {
      position: fixed; inset: 0;
      display: grid;
      grid-template-columns: repeat(var(--cols, 6), 1fr);
      grid-template-rows:    repeat(var(--rows, 4), 1fr);
      gap: 2px;
      overflow: hidden;
    }

    .cell {
      position: relative;
      overflow: hidden;
      background: #1a0033;
      opacity: 0;
      animation: cellIn .7s ease forwards;
    }

    /* fallback ♀ */
    .cell-bg {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, #0e0030, #250050);
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(2rem, 4vw, 3.5rem);
      color: rgba(255,255,255,.07);
      user-select: none;
    }

    .cell img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      display: block;
      animation: breath 9s ease-in-out infinite;
      opacity: 0;
      filter: grayscale(60%) brightness(.8);
      transition: opacity .8s ease, filter .45s ease, transform .45s ease;
    }
    .cell img.loaded { opacity: 1; }

    .cell:hover img {
      filter: grayscale(0%) brightness(1.05);
      transform: scale(1.08);
      animation-play-state: paused;
    }

    .cell::after {
      content: '';
      position: absolute; inset: 0; z-index: 2;
      border: 2px solid transparent;
      box-shadow: inset 0 0 0 0 rgba(224,64,251,0);
      transition: border-color .35s ease, box-shadow .35s ease;
      pointer-events: none;
    }
    .cell:hover::after {
      border-color: rgba(224,64,251,.55);
      box-shadow: inset 0 0 22px rgba(224,64,251,.15);
    }

    /* cada celda respira con un offset diferente (asignado por JS) */
    @keyframes breath {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.07); }
    }

    @keyframes cellIn {
      from { opacity: 0; transform: scale(.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── OVERLAY CENTRAL ────────────────────── */
    .overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      background:
        linear-gradient(to top,  rgba(13,0,26,.75) 0%, transparent 18%),
        linear-gradient(to bottom, rgba(13,0,26,.5) 0%, transparent 12%),
        radial-gradient(ellipse 55% 65% at 50% 50%,
          rgba(13,0,26,.88) 0%,
          rgba(13,0,26,.55) 55%,
          rgba(13,0,26,.1) 100%);
      pointer-events: none;
    }

    .hero {
      text-align: center;
      pointer-events: auto;
      padding: 2rem;
      opacity: 0;
      animation: heroIn 1s ease 1.2s forwards;
    }

    @keyframes heroIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-eyebrow {
      font-family: 'Guardian TextSans Medium', sans-serif;
      font-size: clamp(.6rem, 1.2vw, .75rem);
      letter-spacing: .55em; text-transform: uppercase;
      color: rgba(155,48,208,.8);
      margin-bottom: 1.2rem;
    }

    .hero-8m {
      font-family: 'Guardian Sans Semibold', sans-serif;
      font-size: clamp(6rem, 18vw, 16rem);
      line-height: .88;
      color: #fff;
      text-shadow:
        0 0 80px rgba(224,64,251,.5),
        0 0 160px rgba(155,48,208,.3);
      animation: heroIn 1s ease 1.2s both, glowPulse 4s ease 2.2s infinite;
      margin-bottom: .4rem;
    }

    @keyframes glowPulse {
      0%,100% { text-shadow: 0 0 80px rgba(224,64,251,.5), 0 0 160px rgba(155,48,208,.3); }
      50%      { text-shadow: 0 0 120px rgba(224,64,251,.8), 0 0 220px rgba(155,48,208,.5); }
    }

    .hero-title {
      font-family: 'IBM Plex Serif Italic', serif;
      font-style: italic;
      font-size: clamp(1rem, 3vw, 1.8rem);
      color: rgba(240,217,255,.85);
      line-height: 1.35;
      margin-bottom: 1.8rem;
    }

    .hero-rule {
      display: flex; align-items: center; justify-content: center; gap: .6rem;
      margin-bottom: 1.8rem;
    }
    .hero-rule-line {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(224,64,251,.6));
    }
    .hero-rule-line:last-child {
      background: linear-gradient(to left, transparent, rgba(224,64,251,.6));
    }
    .hero-rule-sym { font-size: .75rem; color: rgba(224,64,251,.7); }

    .hero-date {
      font-family: 'Guardian TextSans Medium', sans-serif;
      font-size: clamp(.65rem, 1.2vw, .8rem);
      letter-spacing: .35em; text-transform: uppercase;
      color: rgba(192,128,255,.6);
    }

    /* ── scroll hint ─────────────────────────── */
    .hero-hint {
      position: fixed; bottom: 2.5rem;
      left: 0; right: 0;
      margin: 0 auto;
      width: max-content;
      z-index: 20;
      display: flex; flex-direction: column; align-items: center; gap: .5rem;
      opacity: 0;
      animation: heroIn 1s 2.2s ease forwards;
      text-decoration: none; color: inherit;
    }
    .hero-hint span {
      font-size: .65rem; letter-spacing: .4em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 0 12px rgba(224,64,251,.9), 0 0 24px rgba(224,64,251,.5);
    }
    .hero-hint-line {
      width: 1px; height: 42px;
      background: linear-gradient(to bottom, rgba(224,64,251,.9), transparent);
      box-shadow: 0 0 6px rgba(224,64,251,.6);
      animation: linePulse 2s ease infinite;
    }
    @keyframes linePulse {
      0%,100% { opacity: .5; } 50% { opacity: 1; }
    }

    /* ── fx canvas ───────────────────────────── */
    #fx-canvas {
      position: fixed; inset: 0; z-index: 999;
      pointer-events: none;
    }


    /* ── RESPONSIVE ──────────────────────────── */
    @media (max-width: 600px) {
      .hero-8m { font-size: 7rem; }
    }
  </style>
</head>
<body>

<div id="mosaic"></div>

<div class="overlay">
  <div class="hero">
    <p class="hero-eyebrow">8 de marzo · 2026</p>
    <h1 class="hero-8m">8M</h1>
    <p class="hero-title">Día Internacional<br>de la Mujer</p>
    <div class="hero-rule">
      <span class="hero-rule-line"></span>
      <span class="hero-rule-sym">♀</span>
      <span class="hero-rule-line"></span>
    </div>
    <p class="hero-date">60 voces · 60 historias</p>
  </div>
</div>

<canvas id="fx-canvas"></canvas>

<a href="mujeres-v2.html" class="hero-hint">
  <span>Continuar</span>
  <div class="hero-hint-line"></div>
</a>

<script>
const W = f => `https://commons.wikimedia.org/wiki/Special:FilePath/${f}?width=400`;

// 24 fotos seleccionadas — reemplaza cualquiera por ruta local o URL propia
const FOTOS = [
  W("Marie_Curie_c._1920s.jpg"),
  W("Frida_Kahlo,_by_Guillermo_Kahlo.jpg"),
  W("Rosa_Parks_1955_bus_arrest.jpg"),
  W("Virginia_Woolf_1927.jpg"),
  W("Malala_Yousafzai_-_World_Economic_Forum_Annual_Meeting_2013.jpg"),
  W("Hedy_Lamarr_Publicity_Photo_for_The_Heavenly_Body_1944.jpg"),
  W("Aretha_Franklin_1968.jpg"),
  W("Simone_de_Beauvoir2.jpg"),
  W("Eleanor_Roosevelt_portrait_1933.jpg"),
  W("Maria_Callas_1957.jpg"),
  W("Katherine_Johnson_1983.jpg"),
  W("Emmeline_Pankhurst_portrait.jpg"),
  W("Maya_Angelou.jpg"),
  W("Coco_Chanel,_1920.jpg"),
  W("Juana_de_Asbaje.jpg"),
  W("Angela_Davis_-_Facing_History.jpg"),
  W("Anne_Frank_passport_photo,_May_1942.jpg"),
  W("Nina_Simone_performing.jpg"),
  W("Ruth_Bader_Ginsburg_2016_portrait.jpg"),
  W("Gabriela_Mistral_Passport_crop.jpg"),
  W("Harriet_Tubman_by_Squyer,_NPG,_c1885.jpg"),
  W("Michelle_Obama_2013_official_portrait.jpg"),
  W("Clara_Campoamor.jpg"),
  W("Chimamanda_Ngozi_Adichie_2013.jpg"),
];

/* ── Calcula cols/rows para mantener proporción 3:4 ── */
function buildMosaic() {
  const mosaic = document.getElementById('mosaic');
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // Ancho objetivo de celda
  const targetW = vw <= 600 ? vw / 3 : Math.max(140, Math.min(200, vw / 7));
  const cols    = Math.round(vw / targetW);
  const cellW   = vw / cols;
  const cellH   = cellW * (4 / 3);               // proporción 3:4 portrait
  const rows    = Math.ceil(vh / cellH) + 1;      // +1 para no dejar hueco
  const total   = cols * rows;

  // aplica variables CSS al grid
  mosaic.style.setProperty('--cols', cols);
  mosaic.style.setProperty('--rows', rows);

  // rellena celdas ciclando el array si hace falta
  const pool = [];
  while (pool.length < total) pool.push(...FOTOS);

  mosaic.innerHTML = '';

  pool.slice(0, total).forEach((src, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.animationDelay = `${i * 35}ms`;

    const bg = document.createElement('div');
    bg.className   = 'cell-bg';
    bg.textContent = '♀';
    cell.appendChild(bg);

    const img = document.createElement('img');
    img.src   = src;
    img.alt   = '';
    img.style.animationDelay = `${(i % 7) * -1.3}s`;
    img.onload = () => img.classList.add('loaded');

    cell.appendChild(img);
    mosaic.appendChild(cell);
  });
}

buildMosaic();
window.addEventListener('resize', buildMosaic);

/* ── FX CANVAS — destellos al click ───────── */
const fx  = document.getElementById('fx-canvas');
const fxx = fx.getContext('2d');

const resizeFx = () => { fx.width = innerWidth; fx.height = innerHeight; };
resizeFx();
window.addEventListener('resize', resizeFx);

class Spark {
  constructor(x, y) {
    this.x = x; this.y = y;
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * 6 + 2;
    this.vx = Math.cos(a) * s;
    this.vy = Math.sin(a) * s - Math.random() * 3;
    this.life = 1;
    this.decay = Math.random() * .03 + .015;
    this.r = Math.random() * 3 + 1;
    this.hue = Math.random() * 55 + 270;
    this.sym = Math.random() < .08;
  }
  step() { this.x += this.vx; this.y += this.vy; this.vy += .09; this.vx *= .99; this.life -= this.decay; }
  draw() {
    fxx.save(); fxx.globalAlpha = Math.max(0, this.life);
    if (this.sym) {
      fxx.font = `${this.r * 5}px serif`;
      fxx.fillStyle = `hsl(${this.hue},90%,72%)`;
      fxx.fillText('♀', this.x, this.y);
    } else {
      fxx.beginPath(); fxx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      fxx.fillStyle = `hsl(${this.hue},90%,70%)`; fxx.fill();
    }
    fxx.restore();
  }
}

class Petal {
  constructor(x, y) {
    this.x = x; this.y = y;
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * 3.5 + 1;
    this.vx = Math.cos(a) * s;
    this.vy = Math.sin(a) * s - Math.random() * 4 - 1.5;
    this.life = 1;
    this.decay = Math.random() * .012 + .007;
    this.sz = Math.random() * 9 + 5;
    this.rot = Math.random() * Math.PI * 2;
    this.dRot = (Math.random() - .5) * .1;
    this.hue = Math.random() * 45 + 270;
  }
  step() { this.x += this.vx; this.y += this.vy; this.vy += .04; this.vx *= .98; this.rot += this.dRot; this.life -= this.decay; }
  draw() {
    fxx.save(); fxx.globalAlpha = Math.max(0, this.life) * .85;
    fxx.translate(this.x, this.y); fxx.rotate(this.rot);
    fxx.beginPath(); fxx.ellipse(0, -this.sz * .5, this.sz * .3, this.sz * .55, 0, 0, Math.PI * 2);
    fxx.fillStyle = `hsl(${this.hue},78%,68%)`; fxx.fill();
    fxx.restore();
  }
}

const particles = [];

document.addEventListener('click', e => {
  for (let i = 0; i < 28; i++) particles.push(new Spark(e.clientX, e.clientY));
  for (let i = 0; i < 16; i++) particles.push(new Petal(e.clientX, e.clientY));
});

(function fxLoop() {
  fxx.clearRect(0, 0, fx.width, fx.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].step(); particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }
  requestAnimationFrame(fxLoop);
})();
</script>
</body>
</html>
