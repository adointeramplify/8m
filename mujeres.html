<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>60 Mujeres que cambiaron el mundo · 8M</title>
  <link rel="stylesheet" href="//s1.ppllstatics.com/starfish/1.6.11/starfish-live-blue.css">
  <style>
    :root {
      --deep:   #0d001a;
      --dark:   #1a0033;
      --mid:    #4a0080;
      --accent: #9b30d0;
      --bright: #e040fb;
      --light:  #f0d9ff;
      --soft:   #c080ff;
      --ciencia:   #7b3fff;
      --arte:      #e040fb;
      --politica:  #ff4fa0;
      --literatura:#b44fef;
      --deporte:   #40c4ff;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--deep);
      color: #fff;
      font-family: 'Guardian TextSans Regular', sans-serif;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* ── HEADER ─────────────────────────────── */
    .hdr {
      background: linear-gradient(180deg, #1f003b 0%, #0d001a 100%);
      border-bottom: 1px solid rgba(155, 48, 208, .2);
      padding: 1.4rem 2rem 0;
    }

    .hdr-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.6rem;
    }

    .hdr-back {
      display: inline-flex; align-items: center; gap: .45rem;
      font-family: 'Guardian TextSans Medium', sans-serif;
      font-size: .75rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--accent);
      transition: color .25s;
    }
    .hdr-back:hover { color: var(--bright); }
    .hdr-back svg { flex-shrink: 0; }

    .hdr-date {
      font-family: 'Guardian TextSans Medium', sans-serif;
      font-size: .72rem; letter-spacing: .2em; text-transform: uppercase;
      color: rgba(155, 48, 208, .5);
    }

    .hdr-main {
      text-align: center;
      padding-bottom: 1.8rem;
      position: relative;
    }

    .hdr-eyebrow {
      font-family: 'Guardian TextSans Medium', sans-serif;
      font-size: .68rem; letter-spacing: .5em; text-transform: uppercase;
      color: var(--accent);
      margin-bottom: .9rem;
      display: flex; align-items: center; justify-content: center; gap: .8rem;
    }
    .hdr-eyebrow::before,
    .hdr-eyebrow::after {
      content: '';
      flex: 1; max-width: 80px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(155,48,208,.5));
    }
    .hdr-eyebrow::after {
      background: linear-gradient(to left, transparent, rgba(155,48,208,.5));
    }

    .hdr-title {
      font-family: 'Guardian Sans Semibold', sans-serif;
      font-size: clamp(1.6rem, 4.5vw, 3rem);
      color: var(--light);
      line-height: 1.1;
      letter-spacing: -.01em;
      margin-bottom: .7rem;
    }

    .hdr-sub {
      font-family: 'IBM Plex Serif Italic', serif;
      font-style: italic;
      font-size: clamp(.85rem, 1.8vw, 1rem);
      color: var(--soft);
      letter-spacing: .02em;
    }

    .hdr-rule {
      margin-top: 1.6rem;
      display: flex; align-items: center; justify-content: center; gap: .6rem;
    }
    .hdr-rule-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, rgba(155,48,208,.35), rgba(224,64,251,.5), rgba(155,48,208,.35), transparent);
    }
    .hdr-rule-sym {
      font-size: .9rem; color: var(--bright);
      opacity: .7; line-height: 1;
    }

    /* ── FILTERS ─────────────────────────────── */
    .filters {
      position: sticky; top: 0; z-index: 90;
      background: rgba(13, 0, 26, .88);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(155, 48, 208, .15);
      padding: .8rem 2rem;
      display: flex; align-items: center; gap: .75rem;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative; flex: 0 0 auto;
      display: flex; align-items: center;
    }

    .search-wrap svg {
      position: absolute; left: .7rem;
      color: var(--mid); pointer-events: none;
    }

    #search {
      background: rgba(74, 0, 128, .25);
      border: 1px solid rgba(155, 48, 208, .35);
      border-radius: 20px;
      padding: .45rem .9rem .45rem 2.1rem;
      color: #fff;
      font-family: 'Guardian TextSans Regular', sans-serif;
      font-size: .82rem;
      width: 180px;
      outline: none;
      transition: border-color .25s, width .3s;
    }
    #search::placeholder { color: var(--mid); }
    #search:focus { border-color: var(--accent); width: 220px; }

    .filter-divider {
      width: 1px; height: 20px;
      background: rgba(155, 48, 208, .3);
      flex-shrink: 0;
    }

    .f-btn {
      font-family: 'Guardian TextSans Medium', sans-serif;
      font-size: .72rem; letter-spacing: .1em;
      text-transform: uppercase;
      padding: .35rem .85rem;
      border-radius: 20px;
      border: 1px solid rgba(155, 48, 208, .4);
      background: transparent;
      color: var(--soft);
      cursor: pointer;
      transition: all .25s;
      white-space: nowrap;
    }
    .f-btn:hover { border-color: var(--accent); color: var(--light); }
    .f-btn.on {
      background: var(--mid);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 12px rgba(224, 64, 251, .3);
    }

    .f-count {
      margin-left: auto;
      font-family: 'Guardian TextSans Medium', sans-serif;
      font-size: .72rem; letter-spacing: .1em;
      color: var(--mid);
      white-space: nowrap;
    }

    /* ── GRID ────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── CARD ─────────────────────────────────── */
    .card {
      background: rgba(26, 0, 51, .7);
      border: 1px solid rgba(155, 48, 208, .2);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .3s ease, border-color .3s ease, box-shadow .3s ease;
      display: flex; flex-direction: column;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(224, 64, 251, .2);
    }

    .card-photo {
      position: relative;
      width: 100%;
      padding-top: 100%; /* fallback para navegadores sin aspect-ratio */
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: var(--dark);
    }
    @supports (aspect-ratio: 1/1) {
      .card-photo { padding-top: 0; }
    }

    .card-fallback {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem;
      color: rgba(255,255,255,.07);
    }
    .card-fallback::before {
      content: '';
      position: absolute; inset: 0;
      opacity: .55;
    }
    .cat-ciencia    .card-fallback::before { background: linear-gradient(160deg, #0e0030, #250050); }
    .cat-arte       .card-fallback::before { background: linear-gradient(160deg, #1e0035, #3a0055); }
    .cat-politica   .card-fallback::before { background: linear-gradient(160deg, #300020, #550035); }
    .cat-literatura .card-fallback::before { background: linear-gradient(160deg, #150030, #380050); }
    .cat-deporte    .card-fallback::before { background: linear-gradient(160deg, #001830, #003050); }

    .card-fallback span { position: relative; z-index: 1; }

    .card-photo img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      opacity: 0;
      transition: opacity .6s ease;
    }
    .card-photo img.loaded { opacity: 1; }

    .card-cat-dot {
      position: absolute; top: .7rem; right: .7rem; z-index: 2;
      width: 8px; height: 8px; border-radius: 50%;
    }
    .cat-ciencia    .card-cat-dot { background: var(--ciencia); box-shadow: 0 0 6px var(--ciencia); }
    .cat-arte       .card-cat-dot { background: var(--arte);    box-shadow: 0 0 6px var(--arte); }
    .cat-politica   .card-cat-dot { background: var(--politica);box-shadow: 0 0 6px var(--politica); }
    .cat-literatura .card-cat-dot { background: var(--literatura);box-shadow: 0 0 6px var(--literatura); }
    .cat-deporte    .card-cat-dot { background: var(--deporte); box-shadow: 0 0 6px var(--deporte); }

    .card-body {
      padding: 1rem 1rem 1.2rem;
      display: flex; flex-direction: column; gap: .4rem;
      flex: 1;
    }

    .card-name {
      font-family: 'Guardian Sans Semibold', sans-serif;
      font-size: clamp(.9rem, 1.8vw, 1.05rem);
      color: var(--light);
      line-height: 1.2;
    }

    .card-role {
      font-family: 'Guardian TextSans Medium', sans-serif;
      font-size: .72rem;
      letter-spacing: .05em;
      line-height: 1.4;
    }
    .cat-ciencia    .card-role { color: var(--ciencia); }
    .cat-arte       .card-role { color: var(--arte); }
    .cat-politica   .card-role { color: var(--politica); }
    .cat-literatura .card-role { color: var(--literatura); }
    .cat-deporte    .card-role { color: var(--deporte); }

    .card-country {
      font-size: .7rem;
      color: rgba(192, 128, 255, .6);
    }

    .card-quote {
      font-family: 'IBM Plex Serif Italic', serif;
      font-style: italic;
      font-size: .78rem;
      color: rgba(240, 217, 255, .7);
      line-height: 1.55;
      margin-top: .4rem;
      border-left: 2px solid rgba(155, 48, 208, .4);
      padding-left: .6rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── MODAL ───────────────────────────────── */
    #modal-bg {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(13, 0, 26, .88);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    #modal-bg.open { display: flex; }

    .modal {
      background: linear-gradient(145deg, #1a0033, #0d001a);
      border: 1px solid rgba(155, 48, 208, .4);
      border-radius: 16px;
      max-width: 560px; width: 100%;
      max-height: 90vh;
      max-height: 90svh;
      overflow-y: auto;
      display: flex; flex-direction: column;
      animation: modalIn .3s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(.95) translateY(20px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }

    .modal-photo {
      width: 100%; height: 300px;
      position: relative; overflow: hidden;
      background: #0d001a;
    }
    .modal-photo img {
      width: 100%; height: 100%;
      object-fit: contain; object-position: center top;
      display: block;
    }
    .modal-photo-fallback {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem; color: rgba(255,255,255,.06);
    }
    .modal-photo-fallback::before {
      content: '';
      position: absolute; inset: 0;
    }

    .modal-body {
      padding: 1.5rem;
      display: flex; flex-direction: column; gap: .8rem;
    }

    .modal-name {
      font-family: 'Guardian Sans Semibold', sans-serif;
      font-size: 1.6rem;
      color: var(--light);
    }

    .modal-meta {
      display: flex; gap: .5rem; align-items: center; flex-wrap: wrap;
    }

    .modal-cat-tag {
      font-family: 'Guardian TextSans Medium', sans-serif;
      font-size: .65rem; letter-spacing: .15em;
      text-transform: uppercase;
      padding: .2rem .6rem;
      border-radius: 20px;
      border: 1px solid currentColor;
    }
    .modal-role {
      font-family: 'Guardian TextSans Medium', sans-serif;
      font-size: .82rem;
      color: var(--soft);
    }
    .modal-country {
      font-size: .75rem;
      color: rgba(192, 128, 255, .6);
    }

    .modal-quote {
      font-family: 'IBM Plex Serif Italic', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--light);
      line-height: 1.65;
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
    }

    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(74, 0, 128, .6);
      border: 1px solid rgba(155, 48, 208, .4);
      color: var(--soft);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem;
      transition: background .2s;
    }
    .modal-close:hover { background: var(--mid); }

    .modal-wrap { position: relative; }

    /* ── FOOTER ──────────────────────────────── */
    footer {
      text-align: center;
      padding: 3rem 2rem;
      color: rgba(155, 48, 208, .4);
      font-size: .75rem; letter-spacing: .3em;
      text-transform: uppercase;
      border-top: 1px solid rgba(155, 48, 208, .1);
    }

    /* ── EMPTY STATE ─────────────────────────── */
    #empty {
      display: none;
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--mid);
      font-family: 'IBM Plex Serif Italic', serif;
      font-style: italic;
      font-size: 1.2rem;
    }

    /* ── RESPONSIVE ──────────────────────────── */
    @media (max-width: 600px) {
      .hdr { padding: 1rem 1rem 0; }
      .hdr-top { margin-bottom: 1rem; }
      .hdr-main { padding-bottom: 1.2rem; }
      .hdr-eyebrow::before, .hdr-eyebrow::after { max-width: 30px; }
      .filters { padding: .6rem 1rem; top: 0; }
      #grid { padding: 1rem; gap: 1rem; grid-template-columns: repeat(2, 1fr); }
      .card-quote { -webkit-line-clamp: 2; }
    }
  </style>
</head>

<script>
/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */

const W = f => `https://commons.wikimedia.org/wiki/Special:FilePath/${f}?width=400`;

const DATA = [
  // ── CIENCIA (12) ────────────────────────────

  { n:"Rosalind Franklin",        c:"Bioquímica · ADN",                           p:"Reino Unido",           t:"ciencia",

  { n:"Katherine Johnson",        c:"Matemática de la NASA",                      p:"EEUU",                  t:"ciencia",

  { n:"Valentina Tereshkova",     c:"Primera mujer en el espacio",                p:"URSS",                  t:"ciencia",

   CAT CONFIG
═══════════════════════════════════════════════════ */
const CAT_LABEL = {
  ciencia:    "Ciencia",
  arte:       "Arte y Cultura",
  politica:   "Política",
  literatura: "Literatura",
  deporte:    "Deporte",
};
const CAT_COLOR = {
  ciencia:    "var(--ciencia)",
  arte:       "var(--arte)",
  politica:   "var(--politica)",
  literatura: "var(--literatura)",
  deporte:    "var(--deporte)",
};

/* ═══════════════════════════════════════════════════
   RENDER CARDS
═══════════════════════════════════════════════════ */
const grid   = document.getElementById('grid');
const empty  = document.getElementById('empty');
const fCount = document.getElementById('f-count');

function renderCard(m) {
  const card = document.createElement('article');
  card.className = `card cat-${m.t}`;
  card.dataset.nombre = m.n;
  card.dataset.cat    = m.t;
  card.dataset.search = (m.n + ' ' + m.c + ' ' + m.p).toLowerCase();

  const imgHtml = m.foto
    ? `<img src="${m.foto}" alt="${m.n}" loading="lazy" onload="this.classList.add('loaded')">`
    : '';

  card.innerHTML = `
    <div class="card-photo">
      <div class="card-fallback"><span>♀</span></div>
      <div class="card-cat-dot"></div>
      ${imgHtml}
    </div>
    <div class="card-body">
      <h3 class="card-name">${m.n}</h3>
      <p class="card-role">${m.c}</p>
      <p class="card-country">${m.p}</p>
      <blockquote class="card-quote">${m.q}</blockquote>
    </div>`;

  card.addEventListener('click', () => openModal(m));
  grid.insertBefore(card, empty);
}

DATA.forEach(renderCard);

/* ═══════════════════════════════════════════════════
   FILTER + SEARCH
═══════════════════════════════════════════════════ */
let activeCat  = 'todas';
let searchTerm = '';

function applyFilters() {
  const cards  = document.querySelectorAll('.card');
  let visible  = 0;

  cards.forEach(card => {
    const catOk    = activeCat === 'todas' || card.dataset.cat === activeCat;
    const searchOk = !searchTerm || card.dataset.search.includes(searchTerm);
    const show     = catOk && searchOk;
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  });

  empty.style.display = visible === 0 ? 'block' : 'none';
  fCount.textContent  = `${visible} de ${DATA.length}`;
}

document.querySelectorAll('.f-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    activeCat = btn.dataset.cat;
    applyFilters();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  applyFilters();
});

/* ═══════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════ */
const modalBg      = document.getElementById('modal-bg');
const modalImg     = document.getElementById('modal-img');
const modalFallbck = document.getElementById('modal-fallback');
const modalName    = document.getElementById('modal-name');
const modalCat     = document.getElementById('modal-cat');
const modalRole    = document.getElementById('modal-role');
const modalCountry = document.getElementById('modal-country');
const modalQuote   = document.getElementById('modal-quote');

function openModal(m) {
  modalName.textContent    = m.n;
  modalCat.textContent     = CAT_LABEL[m.t] || m.t;
  modalCat.style.color     = CAT_COLOR[m.t] || 'var(--accent)';
  modalRole.textContent    = m.c;
  modalCountry.textContent = m.p;
  modalQuote.textContent   = m.q;

  modalImg.classList.remove('loaded');
  modalFallbck.textContent = '♀';

  if (m.foto) {
    modalImg.src = m.foto;
    modalImg.onload = () => modalImg.classList.add('loaded');
  } else {
    modalImg.src = '';
  }

  modalBg.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modalBg.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
modalBg.addEventListener('click', e => { if (e.target === modalBg) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
